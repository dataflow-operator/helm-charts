{{- if .Values.gui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dataflow-operator.gui.fullname" . }}
  labels:
    {{- include "dataflow-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: gui
spec:
  replicas: {{ .Values.gui.replicaCount }}
  selector:
    matchLabels:
      {{- include "dataflow-operator.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gui
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "dataflow-operator.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gui
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "dataflow-operator.gui.serviceAccountName" . }}
      automountServiceAccountToken: true
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: gui
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.gui.image.repository | default .Values.image.repository }}:{{ .Values.gui.image.tag | default .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.gui.image.pullPolicy | default .Values.image.pullPolicy }}
        command:
        - /app/server
        args:
        - --bind-address=:{{ .Values.gui.port }}
        {{- if .Values.gui.logLevel }}
        - --log-level={{ .Values.gui.logLevel }}
        {{- end }}
        env:
        - name: OPERATOR_METRICS_URL
          value: "http://{{ include "dataflow-operator.fullname" . }}:{{ .Values.service.port }}/metrics"
        {{- if and .Values.sentry.enabled .Values.sentry.dsn }}
        - name: SENTRY_DSN
          value: {{ .Values.sentry.dsn | quote }}
        - name: SENTRY_ENVIRONMENT
          value: {{ .Values.sentry.environment | default "production" | quote }}
        - name: SENTRY_TRACES_SAMPLE_RATE
          value: {{ (.Values.sentry.tracesSampleRate | default 0.1) | quote }}
        {{- if .Values.sentry.debug }}
        - name: SENTRY_DEBUG
          value: "true"
        {{- end }}
        {{- if .Values.sentry.release }}
        - name: SENTRY_RELEASE
          value: {{ .Values.sentry.release | quote }}
        {{- end }}
        {{- end }}
        {{- with .Values.gui.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        ports:
        - name: http
          containerPort: {{ .Values.gui.port }}
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.gui.resources | nindent 12 }}
{{- end }}
