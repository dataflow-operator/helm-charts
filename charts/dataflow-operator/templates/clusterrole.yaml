{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "dataflow-operator.fullname" . }}-role
  labels:
    {{- include "dataflow-operator.labels" . | nindent 4 }}
rules:
# Leader election: оператор использует Lease для выбора лидера (coordination.k8s.io)
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - get
  - list
  - update
  - patch
  - watch
# EventRecorder: создание событий для DataFlow (kubectl describe dataflow, UI событий)
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - dataflow.dataflow.io
  resources:
  - dataflows
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - dataflow.dataflow.io
  resources:
  - dataflows/finalizers
  verbs:
  - update
- apiGroups:
  - dataflow.dataflow.io
  resources:
  - dataflows/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
# Operator scrapes processor pods for metrics aggregation
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
# Operator создаёт и владеет Deployments и ConfigMaps для процессоров DataFlow
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# Checkpoint persistence: operator creates ServiceAccount, Role, RoleBinding per DataFlow when spec.checkpointPersistence is true
- apiGroups:
  - ""
  resources:
  - serviceaccounts
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - roles
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - rolebindings
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
{{- if .Values.gui.enabled }}
# GUI: список namespaces для выбора в UI
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - list
  - get
# GUI: доступ к логам подов (pods get/list/watch уже есть для metrics aggregation)
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
{{- end }}
{{- end }}
