name: Release Charts

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.16.0"

      # Явно пакуем чарт, чтобы не зависеть от "changed charts" (git diff от тега).
      # Иначе при отсутствии тегов или когда нет изменений в charts/ action ничего не делает.
      - name: Package chart
        run: |
          mkdir -p .cr-release-packages
          helm package dataflow-operator -d .cr-release-packages

      - name: Run chart-releaser (upload + index)
        uses: helm/chart-releaser-action@v1.7.0
        with:
          skip_packaging: true
          skip_existing: true
          charts_dir: .
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
